name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 同一分支/PR 上后到的 push 取消前一次未完成的 run，节省配额。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 默认令牌只读，单 job 显式按需提权。降低被恶意 PR 利用的风险。
permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install minimal test deps
        # M4 雏形：仅装运行测试所需的轻量依赖；不装 sentence-transformers / playwright 等重物。
        # mock_embedder fixture 用 SHA-256 派生向量，离线零依赖。
        # 这里**不**直接装 requirements.lock，因为 lock 包含 streamlit/torch 等 1GB+ 重物，
        # CI 不需要。仅锁住下面这几个轻包的版本以保证可复现。
        run: |
          python -m pip install --upgrade pip
          pip install \
            "pytest==9.1.0" \
            "pytest-asyncio==1.4.0" \
            "pytest-cov==7.1.0" \
            "loguru==0.7.3" \
            "numpy==2.4.6" \
            "pydantic==2.13.4" \
            "python-dotenv==1.2.2"

      - name: Run unit + integration tests (sqlite only)
        env:
          PYTHONIOENCODING: utf-8
        run: |
          pytest tests/ -v --tb=short \
            --cov=database \
            --cov=tools/chunker \
            --cov=tools/embedder \
            --cov=tools/jd_indexer \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  docstring-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install interrogate
        run: pip install "interrogate==1.7.0"

      - name: Check docstring coverage (≥80%)
        run: |
          interrogate -c pyproject.toml \
            database/ tools/ agents/ crawler/ setup_wizard.py web_app.py
