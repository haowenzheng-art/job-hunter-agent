name: secret-scan

# 在 push / PR 时全量扫描历史和差异。比 GitHub 内置 secret scanning 检测面更广。
# 与本地 pre-commit 钩子双保险：本地拦未提交，CI 拦已 push 上来的 PR。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 每周一早 03:17 跑一次，捕获已合并到 main 但当时未触发的边角情况。
    - cron: '17 3 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0  # 全量历史扫描必需

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc  # v2
        env:
          # 私有仓库需配 GITLEAKS_LICENSE secret；公开仓库可省略。
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        # config-path 在 pinned v2 版本不接受（会 warn unexpected input），
        # gitleaks 会自动从仓库根 .gitleaks.toml 加载。
