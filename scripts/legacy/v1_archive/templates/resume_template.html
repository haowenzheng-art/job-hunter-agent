<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历</title>
    <style>
        body {
            font-family: 'Helvetica Neue', 'Microsoft YaHei', 'SimSun', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 210mm;
            margin: 0 auto;
            padding: 20mm;
            background: white;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 5px;
            color: #2c3e50;
            border-bottom: none;
            font-weight: 700;
        }

        h2 {
            font-size: 18px;
            margin-top: 25px;
            margin-bottom: 10px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
            color: #2c3e50;
            font-weight: 600;
        }

        h3 {
            font-size: 16px;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #34495e;
            font-weight: 600;
        }

        .contact-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        ul, ol {
            margin-top: 5px;
            margin-bottom: 10px;
            padding-left: 20px;
        }

        li {
            margin-bottom: 3px;
        }

        strong, b {
            color: #2c3e50;
            font-weight: 600;
        }

        code {
            background: #f4f4f4;
            padding: 2px 5px;
            border-radius: 3px;
            font-family: 'Courier New', 'Consolas', monospace;
            font-size: 0.9em;
        }

        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }

        pre code {
            background: none;
            padding: 0;
        }

        blockquote {
            border-left: 4px solid #3498db;
            padding-left: 15px;
            margin: 15px 0;
            color: #666;
        }

        a {
            color: #3498db;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .project-meta {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }

        @media print {
            body {
                padding: 0;
                max-width: 100%;
            }

            h2 {
                page-break-after: avoid;
            }

            .no-print {
                display: none;
            }
        }
    </style>
</head>
<body>
    {content}
</body>
</html>
